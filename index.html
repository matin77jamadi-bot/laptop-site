<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فروشگاه گیمینگ متین</title>
    <style>
        body { margin: 0; font-family: Tahoma, sans-serif; background-color: #0d0d0d; color: #fff; display: flex; }
        .sidebar { width: 200px; background: #1a1a1a; height: 100vh; padding: 20px; border-left: 2px solid #e30b12; position: fixed; }
        .sidebar h2 { color: #e30b12; }
        .sidebar a { display: block; color: #fff; padding: 10px 0; text-decoration: none; border-bottom: 1px solid #333; }
        .sidebar a:hover { color: #e30b12; }
        .content { margin-right: 240px; padding: 20px; width: 100%; }
        .brand-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #444; transition: 0.3s; }
        .card:hover { border-color: #e30b12; box-shadow: 0 0 15px #e30b12; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>منوی سایت</h2>
        <a href="#">محصولات</a>
        <a href="#">خرید</a>
        <a href="#">ارتباط با ما</a>
    </div>
    <div class="content">
        <h1>به فروشگاه گیمینگ خوش آمدید</h1>
        <div class="brand-container">
            <div class="card"><h3>Asus ROG</h3></div>
            <div class="card"><h3>Lenovo Legion</h3></div>
            <div class="card"><h3>Acer Predator</h3></div>
            <div class="card"><h3>HP Omen</h3></div>
        </div>
    </div>
</body>
</html>
